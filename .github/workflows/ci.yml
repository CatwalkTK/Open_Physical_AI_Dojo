name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  python-services:
    name: Python services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: ai_robotics/perception_service/requirements.txt
      - run: |
          python -m py_compile \
            ai_robotics/perception_service/app.py \
            ai_robotics/robot/dogzilla_runtime/app.py
      - run: pip install -r ai_robotics/perception_service/requirements.txt
      - run: python -m unittest discover -s ai_robotics/perception_service -p "test_*.py"
