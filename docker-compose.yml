services:
  dogzilla-runtime:
    image: python:3.13-slim
    working_dir: /app
    command: ["python", "app.py"]
    ports:
      - "8090:8090"
    volumes:
      - ./ai_robotics/robot/dogzilla_runtime:/app

  perception-service:
    image: python:3.13-slim
    working_dir: /app
    command: ["sh", "-c", "pip install -q -r requirements.txt && python app.py"]
    ports:
      - "8070:8070"
    volumes:
      - ./ai_robotics/perception_service:/app
      - perception-pip-cache:/root/.cache/pip

  backend:
    image: golang:1.25
    working_dir: /app
    command: ["go", "run", "./cmd/server"]
    depends_on:
      - dogzilla-runtime
      - perception-service
    environment:
      DOGZILLA_RUNTIME_URL: http://dogzilla-runtime:8090
      PERCEPTION_SERVICE_URL: http://perception-service:8070
      DATA_DIR: /data
      PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ./data:/data
      - go-cache:/go/pkg/mod

  frontend:
    image: node:22
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run dev"]
    depends_on:
      - backend
    environment:
      VITE_API_BASE: http://localhost:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

volumes:
  go-cache:
  frontend-node-modules:
  perception-pip-cache:
